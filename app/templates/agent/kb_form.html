{% extends "base.html" %}
{% block title %}{% if article %}{{ article.title }}{% else %}New article{% endif %} · KB{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto bg-white border rounded-xl shadow-sm p-6">
  <h1 class="text-xl font-semibold mb-4">{% if article %}Edit article{% else %}New knowledge base article{% endif %}</h1>
  <form method="post" action="{% if article %}/agent/kb/{{ article.id }}/update{% else %}/agent/kb/new{% endif %}" class="space-y-4 text-sm">
    <div>
      <label class="block text-xs text-slate-500">Title</label>
      <input name="title" required value="{{ article.title if article else '' }}" class="w-full border rounded px-2 py-1" />
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-xs text-slate-500">Category</label>
        <input name="category" value="{{ article.category if article else 'general' }}" class="w-full border rounded px-2 py-1" />
      </div>
      <div>
        <label class="block text-xs text-slate-500">Keywords (space-separated)</label>
        <input name="keywords" value="{{ article.keywords if article else '' }}" class="w-full border rounded px-2 py-1" />
      </div>
    </div>
    <div>
      <label class="block text-xs text-slate-500">Summary</label>
      <input name="summary" required maxlength="512" value="{{ article.summary if article else '' }}" class="w-full border rounded px-2 py-1" />
    </div>
    <div>
      <label class="block text-xs text-slate-500">Body</label>
      <textarea name="body" rows="14" required class="w-full border rounded px-2 py-1 font-mono text-sm">{{ article.body if article else '' }}</textarea>
    </div>
    <label class="text-sm flex items-center gap-2">
      <input type="checkbox" name="published" value="1" {% if not article or article.published %}checked{% endif %} /> Published
    </label>
    <div class="flex gap-2">
      <button class="bg-emerald-600 hover:bg-emerald-700 text-white rounded px-4 py-1.5">Save</button>
      <a href="/agent/kb" class="text-slate-500 px-3 py-1.5">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
