# Fly.io configuration for SeriveNext.
#
# One-time setup:
#   1. Install flyctl:   curl -L https://fly.io/install.sh | sh
#   2. Sign in:          fly auth signup   # (or: fly auth login)
#   3. Launch (will prompt for an app name and region, and pick up this file):
#        fly launch --copy-config --no-deploy
#      Accept the defaults; it will create the app but not deploy yet.
#   4. Create a volume for the SQLite database (must match [[mounts]] below):
#        fly volumes create serivenext_data --size 1
#   5. Set a real session secret:
#        fly secrets set SECRET_KEY="$(openssl rand -hex 32)"
#   6. Deploy:
#        fly deploy
#   7. Open it:
#        fly open
#
# That gives you an HTTPS URL like https://<your-app>.fly.dev that end users
# can actually reach.

# Change this if you want a different subdomain; `fly launch` will rewrite it.
app = "serivenext"
primary_region = "iad"

[build]

[env]
  SEED_ON_START = "1"
  # DATABASE_URL is set in the Dockerfile to point at the mounted volume.

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "serivenext_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
