# fly.toml app configuration file generated for serivenext-yv-kqa on 2026-04-23T21:02:52Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'serivenext-yv-kqa'
primary_region = 'ams'

[build]

[env]
  SEED_ON_START = '1'

[[mounts]]
  source = 'serivenext_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
